services:
  - type: web
    name: nitzutz-api
    runtime: python
    pythonVersion: "3.11.0"
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: FIREBASE_SA_KEY_B64
        sync: false
      - key: FRONTEND_URL
        value: https://sparkids-7f4a4.web.app
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health
