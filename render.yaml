services:
  - type: web
    name: nitzutz-api
    runtime: docker
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: FIREBASE_SA_KEY_B64
        sync: false
      - key: FRONTEND_URL
        value: https://sparkids-7f4a4.web.app
    healthCheckPath: /health
